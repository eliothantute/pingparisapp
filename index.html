                );

                }

                const data = await response.json();
                const current = data.current || {};

                return {
                    temp: Math.round(current.temperature_2m),
                    wind: Math.round(current.wind_speed_10m),

                };

            if ([71, 73, 75, 77, 85, 86].includes(code)) return "❄️";

            return "🌤️";

                            <span className="font-label-sm text-label-sm text-primary uppercase tracking-widest">Explore</span>
                            <h1 className="font-headline-lg-mobile md:font-headline-lg text-on-surface mt-2 mb-3">Toutes les tables</h1>
                            <p className="font-body-md text-on-surface-variant">Recherche par nom, arrondissement ou nombre de tables.</p>
                            <WeatherBlock weather={weather} />
                        </div>

                        <div className="sticky top-20 z-30 mb-6 bg-surface/90 backdrop-blur py-3">
                            <div className="flex items-center bg-surface-container-lowest border border-outline-variant rounded-full px-4 py-3 shadow-sm">
                                <span className="material-symbols-outlined text-on-surface-variant mr-3">search</span>
                                <input
                                    value={searchQuery}
                                    onChange={(event) => setSearchQuery(event.target.value)}
                                    className="flex-1 bg-transparent border-0 p-0 text-on-surface font-body-md placeholder:text-on-surface-variant focus:ring-0 focus:outline-none"
                                    placeholder="Ex: 15th, Temple, Parc..."
                                />
                                {searchQuery && (
                                    <button onClick={() => setSearchQuery("")} className="material-symbols-outlined text-on-surface-variant">close</button>
                                )}
                            </div>
                        </div>

                        <div className="flex items-center justify-between mb-4">
                            <p className="font-label-md text-on-surface-variant">{filteredTables.length} résultat(s)</p>
                            <Link to="/map" className="font-label-md text-primary flex items-center gap-1">
                                Voir la carte
                                <span className="material-symbols-outlined text-sm">map</span>
                            </Link>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-gutter">
                            {filteredTables.map((table) => {
                                const index = tables.findIndex((item) => item.name === table.name);
                                return (
                                    <article key={table.name} className="bg-surface-container-lowest rounded-2xl border border-outline-variant shadow-sm overflow-hidden group">
                                        <div className="h-44 overflow-hidden relative">
                                            <img className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src={table.image} alt={table.name} />
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
                                            <div className="absolute bottom-3 left-3 flex gap-2">
                                                <span className="bg-primary text-on-primary px-3 py-1 rounded-full text-label-sm font-bold">Free</span>
                                                <span className="bg-white/90 text-on-surface px-3 py-1 rounded-full text-label-sm font-bold">{table.tables}</span>
                                            </div>
                                        </div>
                                        <div className="p-4">
                                            <div className="flex justify-between gap-3 mb-1">
                                                <h2 className="font-label-md text-label-md leading-tight">{table.name}</h2>
                                                <div className="flex items-center gap-1 shrink-0">
                                                    <span className="material-symbols-outlined text-sm text-primary" style={{fontVariationSettings: "'FILL' 1"}}>star</span>
                                                    <span className="text-label-sm font-bold">{table.rating}</span>
                                                </div>
                                            </div>
                                            <p className="text-on-surface-variant text-label-sm mb-4">{table.district}</p>
                                            <div className="flex gap-3">
                                                <button onClick={() => navigate(`/detail/${index}`)} className="flex-1 bg-primary text-on-primary h-11 rounded-lg font-label-md active:scale-95 transition-transform">Détail</button>
                                                <button onClick={() => navigate('/map')} className="flex-1 border border-outline-variant text-on-surface h-11 rounded-lg font-label-md active:scale-95 transition-transform">Map</button>
                                            </div>
                                        </div>
                                    </article>
                                );
                            })}
                        </div>

                        {filteredTables.length === 0 && (
                            <div className="text-center py-16 text-on-surface-variant">
                                <span className="material-symbols-outlined text-4xl mb-3">search_off</span>
                                <p>Aucune table trouvée.</p>
                            </div>
                        )}
                    </main>
                    <BottomNavBar />
                </div>
            );
        };

        // --- Screen 5: Profile ---
        const ProfilePage = () => {
            const [activeTab, setActiveTab] = useState('favorites');
            return (
                <div className="bg-surface min-h-screen">
                    <TopAppBar />
                    <main className="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop pt-8 pb-32">
                        <div className="flex flex-col md:flex-row items-center md:items-start gap-8 mb-12">
                            <div className="relative">
                                <div className="w-32 h-32 md:w-40 md:h-40 rounded-full overflow-hidden border-4 border-surface shadow-lg ring-2 ring-primary">
                                    <img alt="Julien" className="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA2tMauUeI7Qw5JDs74AWhjdzFeDtuDo98rmW17540pNpOB0kiwKCPx927mWoZK6zPx3Ewtx8AE1swJ1p7AKT2oR3AuAUnNYnLT7d2VlR73Y3vStbNDVMbMiF-qkgMpxMTQhQPzP_JywNBYiIR2VLeNT7fXrGPAzczK27grhBcLdk2Plcicj9a-BFHPXQl0BuyiJw4iSh6nTv4u3tz4kUnJafxYKinfFtuFjvXCDTEBlx0_zfLpeKWl1pv16MZkFPXL4HJsyWghW6SN" />
                                </div>
                                <div className="absolute bottom-1 right-1 bg-primary text-white p-1.5 rounded-full border-2 border-surface flex items-center justify-center">
                                    <span className="material-symbols-outlined text-sm" style={{fontVariationSettings: "'FILL' 1"}}>verified</span>
                                </div>
                            </div>
                            <div className="flex-1 text-center md:text-left">
                                <div className="flex flex-col md:flex-row md:items-baseline md:gap-4 mb-2">
                                    <h1 className="font-headline-lg text-headline-lg-mobile md:text-headline-lg">Julien Lefebvre</h1>
                                    <span className="font-label-md text-on-surface-variant bg-surface-container px-3 py-1 rounded-full w-fit mx-auto md:mx-0">Pro Explorer</span>
                                </div>
                                <p className="font-body-lg text-on-surface-variant max-w-lg mb-6">Passionate ping-pong explorer. On a mission to find the best stone tables hidden in Paris's arrondissements.</p>
                                <div className="flex justify-center md:justify-start gap-8">
                                    <div className="text-center md:text-left"><div className="font-headline-md text-primary">15</div><div className="text-label-sm uppercase">Spots</div></div>
                                    <div className="text-center md:text-left"><div className="font-headline-md text-primary">28</div><div className="text-label-sm uppercase">Games</div></div>
                                    <div className="text-center md:text-left"><div className="font-headline-md text-primary">9.8</div><div className="text-label-sm uppercase">Rep</div></div>
                                </div>
                                <button
                                    onClick={() => alert("Pour installer Ping Paris :\n\niPhone : Partager → Ajouter à l’écran d’accueil\nAndroid : Menu Chrome → Installer l’application")}
                                    className="mt-6 bg-primary text-on-primary px-6 py-3 rounded-xl font-label-md shadow-md active:scale-95 transition-transform"
                                >
                                    Download App
                                </button>
                            </div>
                        </div>
                        <div className="border-b border-outline-variant mb-8 flex gap-8 overflow-x-auto no-scrollbar">
                            {['Favorites', 'My Photos', 'History'].map(tab => (
                                <button 
                                    key={tab} 
                                    onClick={() => setActiveTab(tab.toLowerCase().replace(' ', ''))}
                                    className={`pb-4 font-label-md whitespace-nowrap border-b-2 transition-colors ${activeTab === tab.toLowerCase().replace(' ', '') ? 'text-primary border-primary' : 'text-on-surface-variant border-transparent'}`}
                                >
                                    {tab}
                                </button>
                            ))}
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-gutter">
                            <div className="group cursor-pointer">
                                <div className="relative aspect-square rounded-xl overflow-hidden mb-3 border border-outline-variant">
                                    <img className="w-full h-full object-cover transition-transform group-hover:scale-105" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBJZYZbqfoPMrfcDV71VkoSZA1BTGkw25x5n-ntN7A-vkefRThOfck6-B4uXnWGqWMrrZ-HKX6cPL7dfACgwSnZ1FBqNsP0QFbHgRXqBClYYxfTHOyI71OyBkcCLv-CVreDLeCp3--bmZPKOXay9cm1vJ5JWq5UDvMrOhQ9eVMzbj_y5bRIj3EaW0nvrrpLHXEYcTLKp_VbAhC_jPqVBryIhNUtaQUrW0e07RSxKUxzJ2z0e7RWh1hibsiXVjIwHUpIn06hGSAgjGiZ" />
                                    <div className="absolute top-3 right-3"><span className="material-symbols-outlined text-primary" style={{fontVariationSettings: "'FILL' 1"}}>favorite</span></div>
                                    <div className="absolute bottom-3 left-3 bg-white/90 px-2 py-1 rounded text-[10px] font-bold">6th Arr.</div>
                                </div>
                                <div className="flex justify-between items-start">
                                    <h3 className="font-label-md">Jardin du Luxembourg</h3>
                                    <div className="flex items-center gap-1"><span className="material-symbols-outlined text-xs text-primary" style={{fontVariationSettings: "'FILL' 1"}}>star</span><span className="font-label-sm">4.9</span></div>
                                </div>
                            </div>
                        </div>
                    </main>
                    <BottomNavBar />
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
            return (
                <MemoryRouter>
                    <Routes>
                        <Route path="/" element={<OnboardingPage />} />
                        <Route path="/signup" element={<SignUpPage />} />
                        <Route path="/map" element={<MapPage />} />
                        <Route path="/explore" element={<ExplorePage />} />
                        <Route path="/detail/:spotId" element={<DetailPage />} />
                        <Route path="/profile" element={<ProfilePage />} />
                    </Routes>
                </MemoryRouter>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js')
            .catch((error) => console.log('Service Worker registration failed:', error));
        });
      }
    </script>
</body>
</html>
